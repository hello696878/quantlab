# configs/instruments/es.yaml
# E-mini S&P 500 futures — Phase 1 instrument spec (research/education only).
# Loaded by app.instruments.registry into a validated, immutable FuturesSpec.

schema_version: 1

# --- Identity ---
root_symbol: ES
name: "E-mini S&P 500"
asset_class: equity_index_future
exchange: CME
underlying: "S&P 500 Index"
settlement_type: cash

# --- Contract economics ---
currency: USD
contract_multiplier: 50          # USD per 1.00 index point
tick_size: 0.25                  # index points
tick_value: 12.50                # validated: == contract_multiplier * tick_size
price_quotation: index_points

# --- Calendar / expiration ---
contract_months: [H, M, U, Z]    # Mar, Jun, Sep, Dec (quarterly cycle)
expiry_rule: third_friday        # SOQ on the 3rd Friday of the contract month
expiry_time_local: "08:30"       # informational

# --- Rollover (V1 conservative) ---
rollover:
  primary_rule: volume_open_interest   # roll when next leads on BOTH volume AND OI
  confirmation_days: 1                 # consecutive days crossover must hold (V1 = 1)
  lookback_window_days: 15             # business days before expiry to scan
  fallback_rule: days_before_expiry    # used when primary data unavailable/ambiguous
  fallback_days_before_expiry: 8       # calendar days before 3rd Friday -> nearest prior session

# --- Trading session assumptions (V1: daily bars) ---
session:
  timezone: America/Chicago            # CME matching-engine TZ; timestamps stored tz-aware
  rth_equity_window_et: "09:30-16:00"  # informational (equity regular hours, Eastern)
  globex_window_ct: "17:00-16:00"      # ~23h electronic session, daily 16:00-17:00 CT break
  bar_frequency: 1d                    # V1 is daily only; intraday is out of scope
  holiday_calendar: null               # NOT modeled in V1

# --- Cost / execution placeholders (NOT used by the data pipeline) ---
costs:
  commission_per_contract_per_side: 2.50   # USD — PLACEHOLDER assumption
  slippage_ticks_per_side: 1               # 1 tick = $12.50 — conservative PLACEHOLDER
  is_placeholder: true
  note: "Illustrative assumptions, not broker quotes. Consumed later by the backtest layer."

# --- Margin (placeholders only; do not hard-code current values) ---
margin:
  initial_margin_usd: null
  maintenance_margin_usd: null
  is_placeholder: true
  note: "Margin changes frequently; populate from a dated source before use. Not used in Phase 1."

# --- Data requirements ---
data:
  required_fields: [timestamp, open, high, low, close, volume, open_interest,
                    root_symbol, contract_symbol, expiry, source, timezone]
  contract_symbol_format: "{root}{month_code}{yy}"   # e.g. ESZ24
  default_adjustment: ratio          # ratio is correct for return-based backtests

# --- Warnings & limitations (surface in every report) ---
warnings:
  - "Back-adjusted prices are fictitious in absolute level; never apply absolute-price logic to them."
  - "Free sources (e.g. yfinance ES=F) provide a pre-stitched front-month proxy without per-contract open interest; correct continuous construction requires true per-contract data."
  - "Margin values are placeholders and change frequently; not used in Phase 1."
  - "Holiday/half-day calendar is not modeled in V1."
  - "Daily bars only in V1; no intraday."
  - "Cash-settled: no delivery mechanics modeled."
